image:
  repository: 310454703994.dkr.ecr.eu-west-1.amazonaws.com/deploy-lab
  tag: latest
  pullSecret: ecr-secret

replicaCount: 1

service:
  type: NodePort
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

db:
  url: jdbc:postgresql://postgres-service:5432/deploylab
  username: deploylab
  password: deploylab
