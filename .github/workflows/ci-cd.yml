name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: deploy-lab

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn -q verify

  push-to-ecr:
    name: Push Image to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Git SHA tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "Pushed image: $REGISTRY/$ECR_REPOSITORY:$TAG"

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Git SHA tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=~/.kube/config

            # Refresh ECR token (expires every 12 hours)
            TOKEN=$(aws ecr get-login-password --region eu-west-1)
            kubectl delete secret ecr-secret -n deploy-lab --ignore-not-found
            kubectl create secret docker-registry ecr-secret \
              --namespace deploy-lab \
              --docker-server=310454703994.dkr.ecr.eu-west-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password=$TOKEN

            # Deploy with Helm using the new image tag
            helm upgrade --install deploy-lab ~/chart \
              --namespace deploy-lab \
              --set image.tag=${{ steps.meta.outputs.tag }}

            # Wait for rollout to complete
            kubectl rollout status deployment/deploy-lab-app -n deploy-lab --timeout=120s