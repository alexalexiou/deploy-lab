services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deploylab
      POSTGRES_USER: deploylab
      POSTGRES_PASSWORD: deploylab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploylab"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/deploylab
      DB_USERNAME: deploylab
      DB_PASSWORD: deploylab
    ports:
      - "8080:8080"
